<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Face Tracking v4.3 | Kusursuz Mimik (Oran Sistemi)</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>

  <style>
    html, body { width: 100vw; height: 100vh; margin: 0; padding: 0; overflow: hidden; background: transparent; }
    #ar-container { overflow: hidden; position: absolute; width: 100vw; height: 100vh; top: 0; left: 0; z-index: 1; }

    #ui {
      position: absolute; top: 10px; left: 10px; color: #fff;
      background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px;
      font-family: 'Segoe UI', sans-serif; z-index: 999; 
      box-shadow: 0 4px 15px rgba(0,255,255,0.3); border: 1px solid #0ea5e9;
      text-align: center; min-width: 220px;
    }
    .info-panel { margin-bottom: 5px; font-weight: bold; color: #0ea5e9; }
    
    #status { font-size: 22px; font-weight: 900; margin-top: 10px; transition: 0.1s; }
    #distance-log { font-size: 14px; font-family: monospace; color: #a855f7; margin-top: 5px; }
  </style>

  <script>
    // ---------------------------------------------------------
    // 🔥 YENİ: BAĞIL ORAN SENSÖRÜ (Kamera mesafesinden etkilenmez!)
    // ---------------------------------------------------------
    AFRAME.registerComponent('mouth-tracker', {
      init: function () {
        this.pTopLip = new THREE.Vector3(); 
        this.pBotLip = new THREE.Vector3();
        this.pLeftEye = new THREE.Vector3(); 
        this.pRightEye = new THREE.Vector3();
      },
      tick: function () {
        const topLip = document.getElementById('point-13');
        const bottomLip = document.getElementById('point-14');
        const leftEye = document.getElementById('point-33');   // Yüzün sol sınırı
        const rightEye = document.getElementById('point-263'); // Yüzün sağ sınırı
        
        const statusEl = document.getElementById('status');
        const distLog = document.getElementById('distance-log');
        
        if (!topLip || !bottomLip || !leftEye || !rightEye || !topLip.object3D.visible) return;

        // 4 noktanın gerçek dünya pozisyonunu al
        topLip.object3D.getWorldPosition(this.pTopLip);
        bottomLip.object3D.getWorldPosition(this.pBotLip);
        leftEye.object3D.getWorldPosition(this.pLeftEye);
        rightEye.object3D.getWorldPosition(this.pRightEye);

        // 1. Dudakların arasındaki mesafeyi ölç
        const mouthDistance = this.pTopLip.distanceTo(this.pBotLip);
        // 2. Yüzün genişliğini ölç
        const faceWidth = this.pLeftEye.distanceTo(this.pRightEye);

        // 3. MATEMATİKSEL ORAN (Kameraya uzaklık artık önemsiz)
        const ratio = mouthDistance / faceWidth;
        
        distLog.innerText = `Ağız/Yüz Oranı: ${ratio.toFixed(3)}`;

        // Ağız kapalıyken bu oran genelde 0.02 - 0.05 arasıdır. Açılınca 0.15'in üstüne çıkar.
        if (ratio > 0.10) { 
            statusEl.innerText = "AĞIZ AÇIK! 🔥";
            statusEl.style.color = "#ef4444"; 
            statusEl.style.textShadow = "0 0 15px #ef4444";
        } else {
            statusEl.innerText = "Ağız Kapalı";
            statusEl.style.color = "#10b981"; 
            statusEl.style.textShadow = "none";
        }
      }
    });

    // 1. ÇİZGİ MOTORU
    AFRAME.registerComponent('dynamic-line', {
      schema: { id1: {type: 'string'}, id2: {type: 'string'}, color: {default: '#0ea5e9'} },
      init: function () { this.p1 = new THREE.Vector3(); this.p2 = new THREE.Vector3(); },
      tick: function () {
        const el1 = document.getElementById(this.data.id1);
        const el2 = document.getElementById(this.data.id2);
        if (!el1 || !el2 || !el1.object3D.visible) { this.el.setAttribute('visible', false); return; }
        this.el.setAttribute('visible', true);
        el1.object3D.getWorldPosition(this.p1); el2.object3D.getWorldPosition(this.p2);
        const startStr = `${this.p1.x.toFixed(4)} ${this.p1.y.toFixed(4)} ${this.p1.z.toFixed(4)}`;
        const endStr = `${this.p2.x.toFixed(4)} ${this.p2.y.toFixed(4)} ${this.p2.z.toFixed(4)}`;
        this.el.setAttribute('line', `start: ${startStr}; end: ${endStr}; color: ${this.data.color}`);
      }
    });

    // 2. YÜZEY MOTORU
    AFRAME.registerComponent('dynamic-triangle', {
      schema: { id1: {type: 'string'}, id2: {type: 'string'}, id3: {type: 'string'}, color: {default: '#ff007f'}, opacity: {default: 0.6} },
      init: function () {
        this.p1 = new THREE.Vector3(); this.p2 = new THREE.Vector3(); this.p3 = new THREE.Vector3();
        this.geometry = new THREE.BufferGeometry();
        this.geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(9), 3));
        this.material = new THREE.MeshBasicMaterial({ color: new THREE.Color(this.data.color), transparent: true, opacity: this.data.opacity, side: THREE.DoubleSide, depthTest: false, depthWrite: false });
        this.mesh = new THREE.Mesh(this.geometry, this.material);
        this.mesh.frustumCulled = false; this.el.setObject3D('mesh', this.mesh);
      },
      tick: function () {
        const el1 = document.getElementById(this.data.id1); const el2 = document.getElementById(this.data.id2); const el3 = document.getElementById(this.data.id3);
        if (!el1 || !el2 || !el3 || !el1.object3D.visible) { this.mesh.visible = false; return; }
        this.mesh.visible = true;
        el1.object3D.getWorldPosition(this.p1); el2.object3D.getWorldPosition(this.p2); el3.object3D.getWorldPosition(this.p3);
        const pos = this.mesh.geometry.attributes.position.array;
        pos[0] = this.p1.x; pos[1] = this.p1.y; pos[2] = this.p1.z; pos[3] = this.p2.x; pos[4] = this.p2.y; pos[5] = this.p2.z; pos[6] = this.p3.x; pos[7] = this.p3.y; pos[8] = this.p3.z;
        this.mesh.geometry.attributes.position.needsUpdate = true;
      }
    });
  </script>
</head>

<body>

<div id="ui">
  <div class="info-panel">MODÜL 3: Zeki Sensör (Oran)</div>
  <div id="status">Sensör Bekleniyor...</div>
  <div id="distance-log">Ağız/Yüz Oranı: 0.000</div>
</div>

<div id="ar-container">
    <a-scene 
      embedded 
      mindar-face="autoStart: true; mirror: false;" 
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      mouth-tracker
    >
      <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>
    </a-scene>
</div>

<script>
const sceneEl = document.querySelector("a-scene");
let currentAnchors = {}; 

const MESH_CONNECTIONS = [
  [33, 160], [160, 158], [158, 133], [133, 153], [153, 144], [144, 33],
  [362, 385], [385, 387], [387, 263], [263, 373], [373, 380], [380, 362],
  [10, 151], [151, 9], [9, 8], [8, 168], [168, 6], [6, 197], [197, 195], [195, 5], [5, 4], [4, 1],
  [61, 185], [185, 40], [40, 39], [39, 37], [37, 0], [0, 267], [267, 269], [269, 270], [270, 409], [409, 291], 
  [291, 375], [375, 321], [321, 405], [405, 314], [314, 17], [17, 84], [84, 181], [181, 91], [91, 146], [146, 61],
  [10, 33], [10, 263], [33, 152], [263, 152]
];

const MAKEUP_SURFACES = [
  [133, 159, 153, "#00FFFF", 0.6], [159, 158, 153, "#00FFFF", 0.6], [158, 160, 144, "#00FFFF", 0.6], 
  [362, 386, 380, "#00FFFF", 0.6], [386, 385, 380, "#00FFFF", 0.6], [385, 387, 373, "#00FFFF", 0.6], 
  [234, 93, 132, "#FF007F", 0.7], [93, 132, 58, "#FF007F", 0.7], 
  [454, 323, 361, "#FF007F", 0.7], [323, 361, 288, "#FF007F", 0.7], 
  [61, 37, 267, "#FFD700", 0.8], [291, 267, 37, "#FFD700", 0.8] 
];

// Sensör için gerekli tüm referans noktaları (Dudaklar ve Göz dış kenarları)
const SENSOR_POINTS = [13, 14, 33, 263];

function createAnchor(index) {
  if (currentAnchors[index]) return currentAnchors[index].id; 
  const id = `point-${index}`;
  const entity = document.createElement("a-entity");
  entity.setAttribute("id", id);
  entity.setAttribute("mindar-face-target", `anchorIndex: ${index}`);
  
  const sphere = document.createElement("a-sphere");
  sphere.setAttribute("radius", "0.003"); 
  sphere.setAttribute("material", "color: #ffffff; shader: flat; transparent: true; opacity: 0.8");
  entity.appendChild(sphere);

  sceneEl.appendChild(entity);
  currentAnchors[index] = { id: id, entity: entity }; 
  return id;
}

function createLine(id1, id2) {
  const lineEntity = document.createElement("a-entity");
  lineEntity.setAttribute("dynamic-line", `id1: ${id1}; id2: ${id2}; color: #00FFFF`);
  sceneEl.appendChild(lineEntity);
}

function createTriangle(id1, id2, id3, color, opacity) {
  const polyEntity = document.createElement("a-entity");
  polyEntity.setAttribute("dynamic-triangle", `id1: ${id1}; id2: ${id2}; id3: ${id3}; color: ${color}; opacity: ${opacity}`);
  sceneEl.appendChild(polyEntity);
}

const initAR = () => {
    // Sensör için gerekli noktaları önceden yükle
    SENSOR_POINTS.forEach(idx => createAnchor(idx));

    MESH_CONNECTIONS.forEach(pair => {
      const idA = createAnchor(pair[0]);
      const idB = createAnchor(pair[1]);
      createLine(idA, idB);
    });

    MAKEUP_SURFACES.forEach(tri => {
      const idA = createAnchor(tri[0]);
      const idB = createAnchor(tri[1]);
      const idC = createAnchor(tri[2]);
      createTriangle(idA, idB, idC, tri[3], tri[4]);
    });
};

if (sceneEl.hasLoaded) {
    initAR();
} else {
    sceneEl.addEventListener('loaded', initAR);
}
</script>

</body>
</html>
