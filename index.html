<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Face Tracking - Gelişmiş Matris v1.0.6</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    #version-display {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: rgba(138, 43, 226, 0.8); /* Siberpunk Moru */
      color: #fff;
      padding: 5px 10px;
      border-radius: 5px;
      font-family: monospace;
      font-weight: bold;
      z-index: 1000;
      pointer-events: none;
    }
  </style>
</head>

    <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>

a-entity> <a-entity mindar-face-target="anchorIndex: 263"><a-sphere color="#00FF00" radius="0.015" opacity="0.9"></a-sphere></a-entity> <a-entity mindar-face-target="anchorIndex: 386"><a-sphere color="#00FF00" radius="0.015" opacity="0.9"></a-sphere></a-entity> <a-entity mindar-face-target="anchorIndex: 374"><a-sphere color="#00FF00" radius="0.015" opacity="0.9"></a-sphere></a-entity> <a-entity mindar-face-target="anchorIndex: 334"><a-sphere color="#FFFF00" radius="0.015" opacity="0.9"></a-sphere></a-entity> </a-scene>

  <script>
    const currentVersion = 'v1.0.6';
    window.addEventListener('load', () => {
      const versionElement = document.getElementById('version-display');
      if (versionElement) {
        versionElement.textContent = `Sürüm: ${currentVersion}`;
      }
    });
  </script>

</body>
</html>
