<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Tracking v1.0.7 - Dinamik Sistem</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>

  <style>
    body { margin:0; overflow:hidden; background:#000; }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 999;
      font-family: monospace;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      border-radius: 8px;
    }

    button {
      margin: 2px;
      padding: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="ui">
  <div>Versiyon: v1.0.7</div>
  <div id="info">Aktif Nokta: 0</div>

  <button onclick="setMode('minimal')">Minimal</button>
  <button onclick="setMode('medium')">Orta</button>
  <button onclick="setMode('full')">Full</button>
  <button onclick="setMode('extreme')">Extreme</button>
</div>

<a-scene mindar-face vr-mode-ui="enabled:false">
  <a-camera active="false"></a-camera>
</a-scene>

<script>
const scene = document.querySelector("a-scene");
const info = document.getElementById("info");

let currentEntities = [];

// 🔥 Yüz grupları (MediaPipe landmark indexleri)
const GROUPS = {
  nose: [1, 4, 10, 152],
  leftEye: [33, 133, 159, 145],
  rightEye: [263, 362, 386, 374],
  mouth: [61, 291, 0, 17],
  eyebrows: [70, 105, 334, 300],
  faceEdge: [234, 454]
};

// 🔥 Modlar
const MODES = {
  minimal: [...GROUPS.nose],

  medium: [
    ...GROUPS.nose,
    ...GROUPS.leftEye,
    ...GROUPS.rightEye
  ],

  full: [
    ...GROUPS.nose,
    ...GROUPS.leftEye,
    ...GROUPS.rightEye,
    ...GROUPS.mouth,
    ...GROUPS.eyebrows,
    ...GROUPS.faceEdge
  ],

  extreme: Array.from({length: 120}, (_, i) => i) // ⚠️ performans testi
};

// 🔥 Temizle
function clearPoints() {
  currentEntities.forEach(e => scene.removeChild(e));
  currentEntities = [];
}

// 🔥 Nokta oluştur
function createPoint(index, color="#00FF00") {
  const entity = document.createElement("a-entity");
  entity.setAttribute("mindar-face-target", `anchorIndex: ${index}`);

  const sphere = document.createElement("a-sphere");
  sphere.setAttribute("radius", "0.015");
  sphere.setAttribute("color", color);
  sphere.setAttribute("opacity", "0.9");

  entity.appendChild(sphere);
  scene.appendChild(entity);

  currentEntities.push(entity);
}

// 🔥 Performans kontrol
function performanceCheck(count) {
  if (count > 80) {
    alert("⚠️ Çok fazla nokta! Mobil cihazlarda kasma veya çökme olabilir.");
  }
}

// 🔥 Mod değiştir
function setMode(mode) {
  clearPoints();

  const points = MODES[mode];

  performanceCheck(points.length);

  points.forEach(i => {
    let color = "#00FF00";

    if (GROUPS.leftEye.includes(i)) color = "#00FFFF";
    if (GROUPS.rightEye.includes(i)) color = "#FF00FF";
    if (GROUPS.mouth.includes(i)) color = "#FFFF00";
    if (GROUPS.nose.includes(i)) color = "#FF0000";

    createPoint(i, color);
  });

  info.textContent = "Aktif Nokta: " + points.length;
}

// 🔥 başlangıç
window.addEventListener("load", () => {
  setMode("medium");
});
</script>

</body>
</html>
