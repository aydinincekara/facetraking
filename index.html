<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Face Tracking - Nokta Matrisi v1.0.5</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    #version-display {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: rgba(0, 255, 0, 0.8); /* Matrix Yeşili */
      color: #000;
      padding: 5px 10px;
      border-radius: 5px;
      font-family: monospace;
      font-weight: bold;
      z-index: 1000;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="version-display">Versiyon: </div>

  <a-scene mindar-face color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    
    <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-face-target="anchorIndex: 10">
      <a-sphere color="#00FF00" radius="0.03" opacity="0.8"></a-sphere>
    </a-entity>

    <a-entity mindar-face-target="anchorIndex: 1">
      <a-sphere color="#00FF00" radius="0.03" opacity="0.8"></a-sphere>
    </a-entity>

    <a-entity mindar-face-target="anchorIndex: 152">
      <a-sphere color="#00FF00" radius="0.03" opacity="0.8"></a-sphere>
    </a-entity>

    <a-entity mindar-face-target="anchorIndex: 61">
      <a-sphere color="#00FF00" radius="0.02" opacity="0.8"></a-sphere>
    </a-entity>

    <a-entity mindar-face-target="anchorIndex: 291">
      <a-sphere color="#00FF00" radius="0.02" opacity="0.8"></a-sphere>
    </a-entity>

    <a-entity mindar-face-target="anchorIndex: 33">
      <a-sphere color="#00FF00" radius="0.02" opacity="0.8"></a-sphere>
    </a-entity>

    <a-entity mindar-face-target="anchorIndex: 263">
      <a-sphere color="#00FF00" radius="0.02" opacity="0.8"></a-sphere>
    </a-entity>

  </a-scene>

  <script>
    const currentVersion = 'v1.0.5';
    window.addEventListener('load', () => {
      const versionElement = document.getElementById('version-display');
      if (versionElement) {
        versionElement.textContent = `Sürüm: ${currentVersion}`;
      }
    });
  </script>

</body>
</html>
