<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Face Tracking v4.0 | Mimik Algılama</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>

  <style>
    html, body { width: 100vw; height: 100vh; margin: 0; padding: 0; overflow: hidden; background: #000; }
    #ui {
      position:absolute; top:10px; left:10px; color:#fff;
      background:rgba(0,0,0,0.8); padding:15px; border-radius:10px;
      font-family: 'Segoe UI', sans-serif; z-index:999; 
      box-shadow: 0 4px 15px rgba(0,255,255,0.3); border: 1px solid #0ea5e9;
      text-align: center; min-width: 200px;
    }
    .info-panel { margin-bottom: 5px; font-weight: bold; color: #0ea5e9; }
    
    /* Etkileşim Paneli */
    #status { font-size: 20px; font-weight: 900; margin-top: 10px; color: #10b981; transition: 0.2s; }
  </style>

  <script>
    // ---------------------------------------------------------
    // 🔥 YENİ: AĞIZ AÇIKLIĞI SENSÖRÜ (Mouth Tracker)
    // ---------------------------------------------------------
    AFRAME.registerComponent('mouth-tracker', {
      tick: function () {
        // Üst ve Alt dudak noktalarını (13 ve 14) bul
        const topLip = document.getElementById('point-13');
        const bottomLip = document.getElementById('point-14');
        const statusEl = document.getElementById('status');
        
        if (!topLip || !bottomLip || !topLip.object3D.visible) return;

        // İki noktanın 3 boyutlu uzaydaki pozisyonlarını al
        const p1 = topLip.object3D.position;
        const p2 = bottomLip.object3D.position;

        // THREE.js ile aralarındaki mesafeyi ölç (distanceTo)
        const distance = p1.distanceTo(p2);

        // Mesafe 0.025 birimden büyükse ağız açık kabul et (Bu değeri test edip değiştirebilirsin)
        if (distance > 0.025) {
            statusEl.innerText = "AĞIZ AÇIK! 🔥";
            statusEl.style.color = "#ef4444"; // Kırmızı
            statusEl.style.textShadow = "0 0 10px #ef4444";
        } else {
            statusEl.innerText = "Ağız Kapalı";
            statusEl.style.color = "#10b981"; // Yeşil
            statusEl.style.textShadow = "none";
        }
      }
    });

    // ÇİZGİ MOTORU (Aynı Stabilite)
    AFRAME.registerComponent('dynamic-line', {
      schema: { id1: {type: 'string'}, id2: {type: 'string'}, color: {default: '#0ea5e9'} },
      init: function () { this.p1 = new THREE.Vector3(); this.p2 = new THREE.Vector3(); },
      tick: function () {
        const el1 = document.getElementById(this.data.id1);
        const el2 = document.getElementById(this.data.id2);
        if (!el1 || !el2 || !el1.object3D.visible) { this.el.setAttribute('visible', false); return; }
        this.el.setAttribute('visible', true);
        el1.object3D.getWorldPosition(this.p1);
        el2.object3D.getWorldPosition(this.p2);
        const startStr = `${this.p1.x.toFixed(4)} ${this.p1.y.toFixed(4)} ${this.p1.z.toFixed(4)}`;
        const endStr = `${this.p2.x.toFixed(4)} ${this.p2.y.toFixed(4)} ${this.p2.z.toFixed(4)}`;
        this.el.setAttribute('line', `start: ${startStr}; end: ${endStr}; color: ${this.data.color}`);
      }
    });
  </script>
</head>

<body>

<div id="ui">
  <div class="info-panel">MODÜL 3: Mimik Sensörü</div>
  <div id="status">Sensör Bekleniyor...</div>
</div>

<a-scene 
  id="main-scene"
  mindar-face="autoStart: true; mirror: false;" 
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  mouth-tracker
>
  <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>
</a-scene>

<script>
const sceneEl = document.querySelector("#main-scene");
let currentAnchors = {}; 

const MESH_CONNECTIONS = [
  [33, 160], [160, 158], [158, 133], [133, 153], [153, 144], [144, 33],
  [362, 385], [385, 387], [387, 263], [263, 373], [373, 380], [380, 362],
  [10, 151], [151, 9], [9, 8], [8, 168], [168, 6], [6, 197], [197, 195], [195, 5], [5, 4], [4, 1],
  [61, 185], [185, 40], [40, 39], [39, 37], [37, 0], [0, 267], [267, 269], [269, 270], [270, 409], [409, 291], 
  [291, 375], [375, 321], [321, 405], [405, 314], [314, 17], [17, 84], [84, 181], [181, 91], [91, 146], [146, 61],
  [10, 33], [10, 263], [33, 152], [263, 152]
];

// Ağız sensörü için ekstra dudak iç noktaları
const SENSOR_POINTS = [13, 14];

function createAnchor(index) {
  if (currentAnchors[index]) return currentAnchors[index].id; 
  const id = `point-${index}`;
  const entity = document.createElement("a-entity");
  entity.setAttribute("id", id);
  entity.setAttribute("mindar-face-target", `anchorIndex: ${index}`);
  
  const sphere = document.createElement("a-sphere");
  sphere.setAttribute("radius", "0.003"); 
  
  // 🔥 KARA ŞÖVALYE DÜZELTMESİ: Işık gerektirmeyen (shader: flat) materyal eklendi.
  sphere.setAttribute("material", "color: #ffffff; shader: flat; transparent: true; opacity: 0.8");
  
  entity.appendChild(sphere);
  sceneEl.appendChild(entity);
  currentAnchors[index] = { id: id, entity: entity }; 
  return id;
}

function createLine(id1, id2) {
  const lineEntity = document.createElement("a-entity");
  lineEntity.setAttribute("dynamic-line", `id1: ${id1}; id2: ${id2}; color: #00FFFF`);
  sceneEl.appendChild(lineEntity);
}

const initAR = () => {
    // Mimik sensörü için gerekli kilit noktaları önceden yarat
    SENSOR_POINTS.forEach(idx => createAnchor(idx));

    // Çizgileri ör
    MESH_CONNECTIONS.forEach(pair => {
      const idA = createAnchor(pair[0]);
      const idB = createAnchor(pair[1]);
      createLine(idA, idB);
    });
};

if (sceneEl.hasLoaded) {
    initAR();
} else {
    sceneEl.addEventListener('loaded', initAR);
}
</script>

</body>
</html>
