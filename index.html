<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Tracking v1.3.0 | Açı Sorunu Çözüldü</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>

  <style>
    body { margin:0; overflow:hidden; background:#000; }

    #ui {
      position:absolute;
      top:10px;
      left:10px;
      color:#fff;
      background:rgba(0,0,0,0.8);
      padding:15px;
      border-radius:10px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      z-index:999;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .info-panel { margin-bottom: 10px; font-weight: bold; }
    #info { color: #10b981; font-size: 14px; margin-top: 5px; }

    button {
      margin:3px;
      padding:8px 12px;
      border:none;
      border-radius:5px;
      cursor:pointer;
      background: #2563eb;
      color: white;
      font-weight: bold;
      transition: 0.2s;
    }
    button:active { background: #1d4ed8; }
    button.extreme { background: #dc2626; }
  </style>
</head>

<body>

<div id="ui">
  <div class="info-panel">Versiyon: v1.3.0 (Kusursuz Açı)</div>
  <div id="info">Nokta: 0</div>

  <div style="margin-top: 10px;">
      <button onclick="setMode('minimal')">Minimal</button>
      <button onclick="setMode('medium')">Orta</button>
      <button onclick="setMode('full')">Full</button>
      <button class="extreme" onclick="setMode('extreme')">Extreme</button>
  </div>
</div>

<a-scene 
  id="main-scene"
  mindar-face="autoStart: true; mirror: false;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  color-space="sRGB"
  renderer="colorManagement: true"
>

  <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>

  </a-scene>

<script>
// Sahneyi (scene) seçiyoruz
const sceneEl = document.querySelector("#main-scene");
const info = document.getElementById("info");

let currentPoints = [];

// 🔥 ANATOMİK GRUPLAR
const GROUPS = {
  nose: [1,4,10,152],
  leftEye: [33,133,159,145],
  rightEye: [263,362,386,374],
  mouth: [61,291,0,17],
  eyebrows: [70,105,334,300],
  faceEdge: [234,454]
};

// 🔥 MODLAR
const MODES = {
  minimal: [...GROUPS.nose],

  medium: [
    ...GROUPS.nose,
    ...GROUPS.leftEye,
    ...GROUPS.rightEye
  ],

  full: [
    ...GROUPS.nose,
    ...GROUPS.leftEye,
    ...GROUPS.rightEye,
    ...GROUPS.mouth,
    ...GROUPS.eyebrows,
    ...GROUPS.faceEdge
  ],

  // Extreme için homojen dağılım
  extreme: Array.from({length: 120}, (_, i) => i * 3) 
};

// 🔥 SIFIRLAMA (Sahnedeki mevcut noktaları sil)
function clearPoints() {
  currentPoints.forEach(p => {
    if(p.parentNode) {
        p.parentNode.removeChild(p);
    }
  });
  currentPoints = [];
}

// 🔥 NOKTA ÜRETİM MOTORU
function createPoint(index, color="#00FF00") {
  // Takip Çıpası (Target)
  const entity = document.createElement("a-entity");
  entity.setAttribute("mindar-face-target", `anchorIndex: ${index}`);

  // Görsel (Küre)
  const sphere = document.createElement("a-sphere");
  sphere.setAttribute("radius", "0.007"); 
  sphere.setAttribute("color", color);
  sphere.setAttribute("opacity", "0.9");

  // Küreyi takip noktasına ekle
  entity.appendChild(sphere);

  // 🔥 KRİTİK DEĞİŞİKLİK: Takip noktasını DOĞRUDAN a-scene içine ekle
  sceneEl.appendChild(entity);

  currentPoints.push(entity);
}

// 🔥 PERFORMANS GÜVENLİĞİ
function performanceCheck(count) {
  if (count > 80) {
    info.style.color = "#fbbf24"; 
    info.textContent = `Uyarı: ${count} nokta. Cihaz ısınabilir!`;
  } else {
    info.style.color = "#10b981"; 
    info.textContent = `Aktif Nokta: ${count}`;
  }
}

// 🔥 MOD DEĞİŞTİRİCİ
function setMode(mode) {
  clearPoints();
  const points = MODES[mode];
  
  performanceCheck(points.length);

  points.forEach(i => {
    let color = "#10b981"; // Varsayılan Yeşil

    if (GROUPS.leftEye.includes(i)) color = "#0ea5e9"; 
    if (GROUPS.rightEye.includes(i)) color = "#d946ef"; 
    if (GROUPS.mouth.includes(i)) color = "#f59e0b"; 
    if (GROUPS.nose.includes(i)) color = "#ef4444"; 

    createPoint(i, color);
  });
}

// 🔥 BAŞLAT
// Not: A-Frame sahnesi tamamen yüklenmeden dinamik element eklemek bazen hatalara yol açabilir.
// Bu yüzden sahnenin 'loaded' olayını dinliyoruz.
sceneEl.addEventListener('loaded', function () {
    setMode("medium");
});
</script>

</body>
</html>
