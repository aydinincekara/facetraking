<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Tracking v3.0 | Dinamik Makyaj</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>

  <style>
    body { margin:0; overflow:hidden; background:#000; }
    #ui {
      position:absolute; top:10px; left:10px; color:#fff;
      background:rgba(0,0,0,0.8); padding:15px; border-radius:10px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      z-index:999; box-shadow: 0 4px 15px rgba(255,0,127,0.3);
      border: 1px solid #ff007f;
    }
    .info-panel { margin-bottom: 5px; font-weight: bold; color: #ff007f; }
    #info { color: #fff; font-size: 13px; margin-top: 5px; }
  </style>

  <script>
    // 🔥 EĞİTİMİN YENİ KALBİ: DİNAMİK ÜÇGEN (YÜZEY) BİLEŞENİ
    // Kendisine verilen 3 noktayı okur, içini renkli bir alan (mesh) ile doldurur.
    AFRAME.registerComponent('dynamic-triangle', {
      schema: {
        id1: {type: 'string'},
        id2: {type: 'string'},
        id3: {type: 'string'},
        color: {default: '#ff007f'}, // Pembe/Neon renk
        opacity: {default: 0.6}      // Yarı saydamlık (makyaj hissiyatı için)
      },
      
      init: function () {
        // Pozisyonları hafızaya alalım
        this.p1 = new THREE.Vector3();
        this.p2 = new THREE.Vector3();
        this.p3 = new THREE.Vector3();

        // Üçgen Geometrisi Oluştur (Three.js BufferGeometry)
        this.geometry = new THREE.BufferGeometry();
        const vertices = new Float32Array(9); // 3 nokta x (X,Y,Z)
        this.geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));

        // Materyal (Yarı saydam, çift taraflı)
        this.material = new THREE.MeshBasicMaterial({
          color: new THREE.Color(this.data.color),
          transparent: true,
          opacity: this.data.opacity,
          side: THREE.DoubleSide
        });

        // Üçgeni A-Frame sahnesine bağla
        this.mesh = new THREE.Mesh(this.geometry, this.material);
        this.el.setObject3D('mesh', this.mesh);
      },

      tick: function () {
        const el1 = document.getElementById(this.data.id1);
        const el2 = document.getElementById(this.data.id2);
        const el3 = document.getElementById(this.data.id3);
        
        // Güvenlik: Noktalar yoksa veya görünmüyorsa üçgeni gizle
        if (!el1 || !el2 || !el3 || !el1.object3D.visible) {
            this.mesh.visible = false;
            return;
        }
        this.mesh.visible = true;

        // Pozisyonları zorla güncelle
        el1.object3D.updateMatrixWorld(true);
        el2.object3D.updateMatrixWorld(true);
        el3.object3D.updateMatrixWorld(true);

        // Gerçek dünya koordinatlarını al
        el1.object3D.getWorldPosition(this.p1);
        el2.object3D.getWorldPosition(this.p2);
        el3.object3D.getWorldPosition(this.p3);

        // Üçgenin 3 köşesinin koordinatlarını anlık değiştir
        const positions = this.mesh.geometry.attributes.position.array;
        positions[0] = this.p1.x; positions[1] = this.p1.y; positions[2] = this.p1.z;
        positions[3] = this.p2.x; positions[4] = this.p2.y; positions[5] = this.p2.z;
        positions[6] = this.p3.x; positions[7] = this.p3.y; positions[8] = this.p3.z;
        
        // "Noktalar değişti, ekranı yeniden çiz" komutu
        this.mesh.geometry.attributes.position.needsUpdate = true;
      }
    });
  </script>
</head>

<body>

<div id="ui">
  <div class="info-panel">MODÜL 2: Dinamik Makyaj</div>
  <div id="info">Yüzeyler Örülüyor...</div>
</div>

<a-scene 
  id="main-scene"
  mindar-face="autoStart: true; mirror: false;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>
</a-scene>

<script>
const sceneEl = document.querySelector("#main-scene");
const info = document.getElementById("info");
let currentAnchors = {}; 

// 🔥 MAKYAJ YÜZEY HARİTASI (ÜÇGENLER)
// Format: [Nokta1, Nokta2, Nokta3, Renk, Saydamlık]
const MAKEUP_SURFACES = [
  // Sol Göz Farı (Mavi Tonlar)
  [133, 159, 153, "#00FFFF", 0.5],
  [159, 158, 153, "#00FFFF", 0.5],
  [158, 160, 144, "#00FFFF", 0.5],

  // Sağ Göz Farı (Mavi Tonlar)
  [362, 386, 380, "#00FFFF", 0.5],
  [386, 385, 380, "#00FFFF", 0.5],
  [385, 387, 373, "#00FFFF", 0.5],

  // Sol Yanak Allığı (Pembe/Kırmızı Tonlar)
  [234, 93, 132, "#FF007F", 0.4],
  [93, 132, 58, "#FF007F", 0.4],

  // Sağ Yanak Allığı (Pembe/Kırmızı Tonlar)
  [454, 323, 361, "#FF007F", 0.4],
  [323, 361, 288, "#FF007F", 0.4],
  
  // Dudak Parlatıcısı (Sarı/Altın Tonlar)
  [61, 37, 267, "#FFD700", 0.6],
  [291, 267, 37, "#FFD700", 0.6]
];

// Nokta yaratma (Görünmez yapıyoruz ki sadece makyaj yüzeyi görünsün)
function createAnchor(index) {
  if (currentAnchors[index]) return currentAnchors[index].id; 

  const id = `point-${index}`;
  const entity = document.createElement("a-entity");
  entity.setAttribute("id", id);
  entity.setAttribute("mindar-face-target", `anchorIndex: ${index}`);
  
  // Bu kez noktaları görünmez yapıyoruz, böylece sadece yüzeyler görünecek
  // entity.appendChild(sphere); (Bu satırı sildik)
  
  sceneEl.appendChild(entity);
  currentAnchors[index] = { id: id, entity: entity }; 
  return id;
}

// Yüzey (Üçgen) Yaratma Motoru
function createTriangle(id1, id2, id3, color, opacity) {
  const polyEntity = document.createElement("a-entity");
  polyEntity.setAttribute("dynamic-triangle", `id1: ${id1}; id2: ${id2}; id3: ${id3}; color: ${color}; opacity: ${opacity}`);
  sceneEl.appendChild(polyEntity);
}

const initMakeup = () => {
    let surfaceCount = 0;
    MAKEUP_SURFACES.forEach(tri => {
      // 3 noktayı yarat
      const idA = createAnchor(tri[0]);
      const idB = createAnchor(tri[1]);
      const idC = createAnchor(tri[2]);
      
      // Noktalar arasına renkli yüzeyi ger
      createTriangle(idA, idB, idC, tri[3], tri[4]);
      surfaceCount++;
    });
    info.textContent = `Aktif Makyaj Yüzeyi: ${surfaceCount}`;
};

if (sceneEl.hasLoaded) {
    initMakeup();
} else {
    sceneEl.addEventListener('loaded', initMakeup);
}
</script>

</body>
</html>
