<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <title>Face Tracking v1.0.9 FIX</title>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>

  <style>
    body { margin:0; overflow:hidden; background:#000; }
    #ui {
      position:absolute;
      top:10px;
      left:10px;
      color:white;
      background:rgba(0,0,0,0.6);
      padding:10px;
      font-family:monospace;
    }
  </style>
</head>

<body>

<div id="ui">
  v1.0.9 FIX - Gerçek Tracking
</div>

<a-scene 
  mindar-face="autoStart: true;"
  vr-mode-ui="enabled:false"
  device-orientation-permission-ui="enabled:false"
>

  <a-camera active="false"></a-camera>

  <!-- 🔥 TÜM NOKTALAR TEK ROOT ALTINDA -->
  <a-entity id="faceRoot" mindar-face-target="anchorIndex: 1">

    <!-- 🔥 BURAYA TÜM NOKTALAR -->
    
  </a-entity>

</a-scene>

<script>
const faceRoot = document.querySelector("#faceRoot");

// 🔥 TEST NOKTALARI (istediğin gibi artır)
const points = [10,152,234,454,1,4,61,291,33,263];

points.forEach(i => {

  const entity = document.createElement("a-entity");
  entity.setAttribute("mindar-face-target", `anchorIndex: ${i}`);

  const sphere = document.createElement("a-sphere");
  sphere.setAttribute("radius", "0.015");
  sphere.setAttribute("color", "#00FF00");

  entity.appendChild(sphere);

  // 🔥 KRİTİK: scene değil faceRoot'a ekliyoruz
  faceRoot.appendChild(entity);
});
</script>

</body>
</html>
