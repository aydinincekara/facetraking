<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Face Tracking - Palyaço Filtresi v1.0.3</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>
  
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    #version-display {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: rgba(255, 165, 0, 0.8); /* Turuncu renk */
      color: #fff;
      padding: 5px 10px;
      border-radius: 5px;
      font-family: sans-serif;
      font-size: 14px;
      font-weight: bold;
      z-index: 1000;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="version-display">Versiyon: </div>

  <a-scene mindar-face color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    
    <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-face-target="anchorIndex: 1">
      <a-sphere color="#FF0000" radius="0.08" position="0 0 0" opacity="0.9"></a-sphere>
    </a-entity>

    <a-entity mindar-face-target="anchorIndex: 10">
      <a-cone color="#0000FF" radius-bottom="0.2" radius-top="0" height="0.4" position="0 0.2 0.1" rotation="10 0 0"></a-cone>
    </a-entity>

    <a-entity mindar-face-target="anchorIndex: 133">
       <a-box color="black" depth="0.02" height="0.06" width="0.1" position="0 0 0" opacity="0.7"></a-box>
    </a-entity>
    
    <a-entity mindar-face-target="anchorIndex: 362">
       <a-box color="black" depth="0.02" height="0.06" width="0.1" position="0 0 0" opacity="0.7"></a-box>
    </a-entity>

  </a-scene>

  <script>
    const currentVersion = 'v1.0.3';
    window.addEventListener('load', () => {
      const versionElement = document.getElementById('version-display');
      if (versionElement) {
        versionElement.textContent = `Sürüm: ${currentVersion}`;
      }
    });
  </script>

</body>
</html>
